<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <!-- iOS home-screen icon (ignores the manifest + SVG; needs a PNG) -->
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="An open, searchable graph of mathematics."
    />
    <!-- PWA: installable, standalone, theme-matched -->
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Turnstile" />
    <title>Turnstile</title>
    <script>
      // Apply the saved/system theme before first paint to avoid a flash.
      (function () {
        try {
          var t = localStorage.getItem('mathgraph-theme')
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
          }
          document.documentElement.dataset.theme = t
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
